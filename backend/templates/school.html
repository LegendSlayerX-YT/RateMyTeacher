<!doctype html>
<html lang="en">
    <head>
        <title>rate_my_teacher_fe</title>
        <link rel="stylesheet" href="static/school.css">
    </head>
    <body>
        <div id="root">
            <h1>Rate My Teacher</h1>
        </div>
        <div class="main_part">
            <p>Search for a School</p>
            <label for="name">School Name:</label>
            <input type="text" id="School Name" name="name" />
            <br>
            <label for="state">State:</label>
            <input type="text" id="School State" name="state" />
            <br>
            <label for="city">City:</label>
            <input type="text" id="School City" name="city" />
            <br>
            <label for="zip code">Zip Code:</label>
            <input type="text" id="School Zip Code" name="zip code" />
            <br>
            <label for="address">Address:</label>
            <input type="text" id="School Address" name="address" />
            <br>
            <label for="grade_levels">Grade Levels:</label>

            <select name="grade_levels" id="School Grade Levels">
            <option value="">Not Specified</option>
            <option value="TK-5">TK-5</option>
            <option value="TK-8">TK-8</option>
            <option value="TK-12">TK-12</option>
            <option value="6-12">6-12</option>
            <option value="Middle School">Middle School</option>
            <option value="High School">High School</option>
            </select>
            <br>
            <input type="button" id="Search School" value="Search" />
            <div id="school_list"> </div>
        </div>
        <div id="add_school_params" class="hidden popview"> 
            <div id="add_school_params_inner" class="opaque">
                <label for="name">School Name:</label>
                <input type="text" id="Add School Name" name="name" />
                <br>
                <label for="state">State:</label>
                <input type="text" id="Add School State" name="state" />
                <br>
                <label for="city">City:</label>
                <input type="text" id="Add School City" name="city" />
                <br>
                <label for="zip code">Zip Code:</label>
                <input type="text" id="Add School Zip Code" name="zip code" />
                <br>
                <label for="address">Address:</label>
                <input type="text" id="Add School Address" name="address" />
                <br>
                <label for="grade_levels">Grade Levels:</label>

                <select name="grade_levels" id="Add School Grade Levels">
                <option value="TK-5">TK-5</option>
                <option value="TK-8">TK-8</option>
                <option value="TK-12">TK-12</option>
                <option value="6-12">6-12</option>
                <option value="Middle School">Middle School</option>
                <option value="High School">High School</option>
                </select>
                <br>
                <input type="button" id="Add School" value="Add" />
                <input type="button" id="Cancel Add School" value="Cancel" />
            </div>
        </div>
        <script src="static/school.js"></script>

    </body>
</html>
